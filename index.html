<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E7C66">
<meta name="description" content="Norðurljós — gamifikovaná výuka islandštiny A1–C1, česky.">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<title>Norðurljós — islandština hravě</title>
<style>
:root{
  --paper:#F3F7FA; --card:#FFFFFF; --ink:#1C2733; --muted:#5B6B7A;
  --accent:#0E7C66; --accent-ink:#FFFFFF; --accent-soft:#DCEFE9;
  --lava:#D4544A; --lava-soft:#FBE7E5; --lupine:#6F5FA8; --lupine-soft:#EDEAF6;
  --gold:#C9A227; --mist:#D9E4EC; --shadow:0 1px 3px rgba(28,39,51,.08),0 4px 14px rgba(28,39,51,.06);
}
@media (prefers-color-scheme: dark){:root{
  --paper:#131A22; --card:#1C2733; --ink:#E8EFF4; --muted:#93A4B3;
  --accent:#3FD6A8; --accent-ink:#0D2018; --accent-soft:#1E3A33;
  --lava:#F07B72; --lava-soft:#3C2523; --lupine:#A79AE0; --lupine-soft:#2C2740;
  --gold:#E3C35B; --mist:#2A3846; --shadow:0 1px 3px rgba(0,0,0,.4);
}}
:root[data-theme="light"]{
  --paper:#F3F7FA; --card:#FFFFFF; --ink:#1C2733; --muted:#5B6B7A;
  --accent:#0E7C66; --accent-ink:#FFFFFF; --accent-soft:#DCEFE9;
  --lava:#D4544A; --lava-soft:#FBE7E5; --lupine:#6F5FA8; --lupine-soft:#EDEAF6;
  --gold:#C9A227; --mist:#D9E4EC; --shadow:0 1px 3px rgba(28,39,51,.08),0 4px 14px rgba(28,39,51,.06);
}
:root[data-theme="dark"]{
  --paper:#131A22; --card:#1C2733; --ink:#E8EFF4; --muted:#93A4B3;
  --accent:#3FD6A8; --accent-ink:#0D2018; --accent-soft:#1E3A33;
  --lava:#F07B72; --lava-soft:#3C2523; --lupine:#A79AE0; --lupine-soft:#2C2740;
  --gold:#E3C35B; --mist:#2A3846; --shadow:0 1px 3px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;margin:0;line-height:1.5}
.serif,.is{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
#app{max-width:640px;margin:0 auto;padding:0 16px 64px}
h1,h2,h3{text-wrap:balance;margin:0}
button{font:inherit;cursor:pointer;border:none;border-radius:12px}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
input,select{font:inherit;color:var(--ink);background:var(--card);border:1.5px solid var(--mist);border-radius:10px;padding:10px 12px}
.topbar{display:flex;align-items:center;gap:14px;padding:14px 2px;position:sticky;top:0;background:var(--paper);z-index:5}
.topbar .brand{font-size:1.05rem;font-weight:700;margin-right:auto}
.stat{display:flex;align-items:center;gap:5px;font-weight:700;font-variant-numeric:tabular-nums;font-size:.95rem}
.stat small{font-weight:400;color:var(--muted)}
.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:20px}
.btn{background:var(--accent);color:var(--accent-ink);padding:13px 22px;font-weight:700;border-radius:14px;transition:transform .08s}
.btn:active{transform:scale(.97)}
.btn.ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn.quiet{background:var(--mist);color:var(--ink)}
.btn.danger{background:var(--lava-soft);color:var(--lava)}
.btn[disabled]{opacity:.45;cursor:default}
.row{display:flex;gap:10px;align-items:center}
.col{display:flex;flex-direction:column;gap:12px}
.eyebrow{text-transform:uppercase;letter-spacing:.09em;font-size:.72rem;font-weight:700;color:var(--muted)}
/* course map */
.level-head{display:flex;align-items:baseline;gap:10px;margin:30px 0 4px;border-bottom:2px solid var(--mist);padding-bottom:6px}
.level-head h2{font-size:1.25rem}
.level-head .pct{margin-left:auto;color:var(--muted);font-variant-numeric:tabular-nums;font-size:.85rem}
.path{display:flex;flex-direction:column;gap:10px;margin:14px 0}
.node{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px;width:100%;text-align:left;color:var(--ink)}
.node .dot{width:44px;height:44px;border-radius:50%;flex:none;display:grid;place-items:center;font-weight:800;background:var(--accent-soft);color:var(--accent);font-variant-numeric:tabular-nums}
.node.done .dot{background:var(--accent);color:var(--accent-ink)}
.node.locked{opacity:.5}
.node.locked .dot{background:var(--mist);color:var(--muted)}
.node .t{font-weight:700}
.node .stars{margin-left:auto;color:var(--gold);letter-spacing:2px;font-size:.9rem;flex:none}
.node small{color:var(--muted);display:block;font-weight:400}
/* lesson */
.progress{height:12px;background:var(--mist);border-radius:6px;overflow:hidden;flex:1}
.progress i{display:block;height:100%;background:var(--accent);border-radius:6px;transition:width .3s}
.hearts{font-size:1rem;letter-spacing:2px;flex:none;color:var(--lava);font-variant-numeric:tabular-nums}
.ex-card{margin-top:18px}
.ex-q{font-size:1.15rem;margin:6px 0 18px}
.ex-q .is{font-size:1.45rem}
.opts{display:grid;gap:10px}
.opts.two{grid-template-columns:1fr 1fr}
.opt{background:var(--card);border:2px solid var(--mist);border-radius:12px;padding:13px 15px;text-align:left;color:var(--ink);font-size:1.02rem}
.opt.sel{border-color:var(--accent);background:var(--accent-soft)}
.opt.right{border-color:var(--accent);background:var(--accent-soft)}
.opt.wrong{border-color:var(--lava);background:var(--lava-soft)}
.opt[disabled]{cursor:default}
.chips{display:flex;flex-wrap:wrap;gap:8px;min-height:52px;border-bottom:2px solid var(--mist);padding-bottom:10px;margin-bottom:14px}
.chip{background:var(--accent-soft);color:var(--ink);border-radius:10px;padding:9px 13px;font-size:1.02rem}
.bank .chip{background:var(--card);border:1.5px solid var(--mist)}
.bank{display:flex;flex-wrap:wrap;gap:8px}
.chip.used{visibility:hidden}
.typein{width:100%;font-size:1.1rem;padding:13px}
.feedback{position:fixed;left:0;right:0;bottom:0;padding:18px 16px 26px;z-index:10}
.feedback .inner{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.feedback.ok{background:var(--accent-soft)}
.feedback.bad{background:var(--lava-soft)}
.feedback .msg{font-weight:800}
.feedback.ok .msg{color:var(--accent)}
.feedback.bad .msg{color:var(--lava)}
.feedback .detail{width:100%;font-size:.95rem}
.feedback .btn{margin-left:auto}
.checkbar{position:fixed;left:0;right:0;bottom:0;padding:14px 16px 24px;background:var(--paper);border-top:1px solid var(--mist);z-index:9}
.checkbar .inner{max-width:640px;margin:0 auto;display:flex;gap:10px}
.checkbar .btn{flex:1}
.tip{background:var(--lupine-soft);border-radius:14px;padding:16px 18px;margin:14px 0}
.tip .eyebrow{color:var(--lupine)}
.speak{background:none;border:none;font-size:1.15rem;padding:2px 6px;vertical-align:middle}
/* results */
.result{text-align:center;padding:40px 20px}
.result .big{font-size:2.6rem;font-weight:800;font-variant-numeric:tabular-nums}
.medals{display:flex;gap:12px;justify-content:center;margin:18px 0;flex-wrap:wrap}
.medal{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:12px 18px;min-width:90px}
.medal .v{font-weight:800;font-size:1.3rem;font-variant-numeric:tabular-nums}
.medal .l{color:var(--muted);font-size:.78rem}
.badge-pop{background:var(--lupine-soft);color:var(--lupine);border-radius:12px;padding:10px 16px;font-weight:700;margin:6px auto;display:inline-block}
/* profile */
.badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.badge{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:12px;text-align:center;font-size:.85rem}
.badge.off{opacity:.35}
.badge .ico{font-size:1.6rem}
.matchgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.goalring{color:var(--muted);font-size:.85rem}
table.stattbl{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
table.stattbl td{padding:7px 4px;border-bottom:1px solid var(--mist)}
table.stattbl td:last-child{text-align:right;font-weight:700}
.footer-note{color:var(--muted);font-size:.8rem;text-align:center;margin-top:36px}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>

<div id="app"></div>

<script>
'use strict';
/* ================= DATA ================= */
const COURSE=[
{id:'a1',tag:'Úroveň A1',name:'Fyrstu skrefin — první kroky',lessons:[
 {id:'a1-1',title:'Pozdravy a představení',sub:'halló, takk, ég heiti…',
  tip:'<b>Ég heiti…</b> = jmenuji se. Otázka: <b>Hvað heitir þú?</b> (Jak se jmenuješ?). Islandština „vyká“ jen výjimečně — <b>þú</b> se používá téměř na všechny.',
  vocab:[['halló','ahoj'],['góðan daginn','dobrý den'],['gott kvöld','dobrý večer'],['bless','na shledanou'],['takk','děkuji'],['já','ano'],['nei','ne'],['afsakið','promiňte']],

   {t:'mc',q:'Co znamená otázka <span class="is">„Hvað heitir þú?“</span>',opts:['Jak se jmenuješ?','Odkud jsi?','Kolik je ti let?','Jak se máš?'],a:'Jak se jmenuješ?'},
   {t:'order',cs:'Dobrý den, děkuji.',is:'Góðan daginn takk'},
   {t:'type',q:'Napište islandsky: <b>„ano“</b>',a:'já',word:'já'}]},

  tip:'Číslovky 1–4 se v islandštině <b>skloňují podle rodu</b> (einn/ein/eitt). Zatím se učíme mužský tvar — ten uslyšíte při počítání.',
  vocab:[['einn','jedna'],['tveir','dva'],['þrír','tři'],['fjórir','čtyři'],['fimm','pět'],['sex','šest'],['sjö','sedm'],['átta','osm'],['níu','devět'],['tíu','deset']],
  ex:[
   {t:'mc',q:'Které číslo následuje po <span class="is">„sjö“</span>?',opts:['átta','sex','níu','tíu'],a:'átta',optIs:true},
   {t:'mc',q:'Kolik je <span class="is">tveir + þrír</span>?',opts:['fimm','fjórir','sex','sjö'],a:'fimm',optIs:true},

  vocab:[['mamma','máma'],['pabbi','táta'],['bróðir','bratr'],['systir','sestra'],['barn','dítě'],['fjölskylda','rodina'],['amma','babička'],['afi','děda']],
  ex:[
   {t:'fill',pre:'Amma ___ gömul.',opts:['er','ert','eru'],a:0,cs:'Babička je stará.'},

   {t:'type',q:'Napište islandsky: <b>„sestra“</b>',a:'systir',word:'systir'}]},

  vocab:[['brauð','chléb'],['mjólk','mléko'],['vatn','voda'],['kaffi','káva'],['te','čaj'],['fiskur','ryba'],['ostur','sýr'],['epli','jablko']],

   {t:'mc',q:'Islanďané jedí hodně <span class="is">„fiskur“</span>. Co to je?',opts:['ryba','skopové','chléb','sýr'],a:'ryba'},
   {t:'type',q:'Napište islandsky: <b>„mléko“</b>',a:'mjólk',word:'mjólk'}]},

   {t:'order',cs:'Dnes je pondělí.',is:'Í dag er mánudagur'},
   {t:'type',q:'Napište islandsky: <b>„dnes“</b>',a:'í dag',word:'í dag'},
   {t:'mc',q:'<span class="is">„Laugardagur“</span> doslova znamená…',opts:['den koupele (prádla)','den slunce','den odpočinku','den trhu'],a:'den koupele (prádla)'}]}
]},
{id:'a2',tag:'Úroveň A2',name:'Á ferðinni — na cestě',lessons:[

  tip:'O počasí se mluví neosobně přes <b>það</b>: <i>Það er rigning</i> (prší), <i>Það er kalt</i> (je zima). Islandské přísloví: počasí se změní, počkejte pět minut.',

  ex:[
   {t:'order',cs:'Dnes prší.',is:'Það er rigning í dag'},
   {t:'fill',pre:'Það er ___ úti.',opts:['kalt','kaldur','kuldi'],a:0,cs:'Venku je zima.'},
   {t:'mc',q:'Jak Islanďan řekne, že sněží?',opts:['Það snjóar','Það rignir','Það er sól','Það er vindur'],a:'Það snjóar',optIs:true},
   {t:'type',q:'Napište islandsky: <b>„slunce“</b>',a:'sól',word:'sól'}]},
 {id:'a2-2',title:'Cestování a doprava',sub:'flugvél, rúta, miði…',

  vocab:[['flugvél','letadlo'],['rúta','autobus (dálkový)'],['bíll','auto'],['hjól','kolo'],['flugvöllur','letiště'],['miði','jízdenka'],['ferð','cesta / výlet'],['að keyra','řídit / jet autem']],
  ex:[
   {t:'order',cs:'Jedu autem do Reykjavíku.',is:'Ég keyri til Reykjavíkur'},
   {t:'fill',pre:'Hvar er ___?',opts:['flugvöllurinn','flugvöllur inn','flugvellinum'],a:0,cs:'Kde je (to) letiště? (určitý člen se lepí na konec slova)'},
   {t:'mc',q:'Chcete koupit jízdenku. Co řeknete?',opts:['Einn miða, takk','Ein ferð, bless','Einn bíll, takk','Eitt hjól, takk'],a:'Einn miða, takk',optIs:true},
   {t:'type',q:'Napište islandsky: <b>„letadlo“</b>',a:'flugvél',word:'flugvél'}]},

  vocab:[['að kaupa','kupovat'],['að borga','platit'],['peningar','peníze'],['króna','koruna'],['dýr','drahý'],['ódýr','levný'],['verslun','obchod'],['verð','cena']],
  ex:[
   {t:'order',cs:'Kolik to stojí?',is:'Hvað kostar þetta'},
   {t:'fill',pre:'Ég ætla að ___ þetta.',opts:['kaupa','borga','kosta'],a:0,cs:'Koupím si to.'},

  vocab:[['íbúð','byt'],['herbergi','pokoj'],['eldhús','kuchyň'],['baðherbergi','koupelna'],['rúm','postel'],['borð','stůl'],['stóll','židle'],['gluggi','okno']],
  ex:[
   {t:'order',cs:'Bydlím v malém bytě.',is:'Ég bý í lítilli íbúð'},
   {t:'fill',pre:'Borðið er í ___.',opts:['eldhúsinu','eldhúsið','eldhús'],a:0,cs:'Stůl je v kuchyni. (í + dativ)'},

   {t:'type',q:'Napište islandsky: <b>„okno“</b>',a:'gluggi',word:'gluggi'}]},
 {id:'a2-5',title:'Minulý čas — slabá slovesa',sub:'talaði, borðaði, lærði…',
  tip:'Slabá slovesa tvoří minulý čas příponou <b>-aði / -ði / -ti</b>: <i>tala → talaði</i>, <i>læra → lærði</i>, <i>kaupa → keypti</i>. My (-um): <i>við töluðum</i>.',
  vocab:[['talaði','mluvil(a)'],['borðaði','jedl(a)'],['lærði','učil(a) se'],['horfði','díval(a) se'],['spilaði','hrál(a)'],['eldaði','vařil(a)'],['keypti','koupil(a)'],['í gær','včera']],
  ex:[
   {t:'fill',pre:'Ég ___ íslensku í gær.',opts:['lærði','læri','læra'],a:0,cs:'Včera jsem se učil islandsky.'},

function grantBadges(p,perfect){
  const got=[];const add=id=>{if(!p.badges.includes(id)){p.badges.push(id);got.push(BADGES.find(b=>b.id===id));}};
  const done=Object.keys(p.lessons).filter(k=>p.lessons[k].stars>0).length;
  if(done>=1)add('first');
  if(perfect)add('perfect');
  if(p.streak.count>=7)add('streak7');

  for(const lv of COURSE){if(lv.lessons.every(l=>p.lessons[l.id]&&p.lessons[l.id].stars>0))add('lvl'+lv.id.toUpperCase());}

function streakLive(p){return p.streak.last===today()||p.streak.last===yesterday()?p.streak.count:0;}

/* ================= EXERCISE GENERATION ================= */
function genFromVocab(lesson,allVocab){
  const ex=[];const v=lesson.vocab;
  for(const [is,cs] of sample(v,Math.min(3,v.length))){
    const wrong=sample(allVocab.filter(p=>p[0]!==is).map(p=>p[1]),3);
    ex.push({t:'mc',q:`Co znamená <span class="is">„${esc(is)}“</span>?${speakBtn(is)}`,opts:shuffle([cs,...wrong]),a:cs,word:is});
  }
  for(const [is,cs] of sample(v,Math.min(3,v.length))){
    const wrong=sample(allVocab.filter(p=>p[1]!==cs).map(p=>p[0]),3);
    ex.push({t:'mc',q:`Jak se islandsky řekne <b>„${esc(cs)}“</b>?`,opts:shuffle([is,...wrong]),a:is,word:is,optIs:true});
  }
  if(v.length>=4)ex.push({t:'match',pairs:sample(v,4)});
  for(const [is,cs] of sample(v.filter(p=>p[0].length<=14&&!p[0].includes(' ')),2)){
    ex.push({t:'type',q:`Napište islandsky: <b>„${esc(cs)}“</b>`,a:is,word:is});
  }
  return ex;
}
function buildQueue(lesson){
  const allVocab=COURSE.flatMap(lv=>lv.lessons).flatMap(l=>l.vocab);
  const gen=genFromVocab(lesson,allVocab);
  const authored=(lesson.ex||[]).map(e=>({...e}));
  return shuffle([...authored,...gen]).slice(0,12);
}
function buildReviewQueue(p){
  const allVocab=COURSE.flatMap(lv=>lv.lessons).flatMap(l=>l.vocab);
  const learned=[];
  for(const lv of COURSE)for(const l of lv.lessons)if(p.lessons[l.id])learned.push(...l.vocab);
  if(!learned.length)return[];
  const weakWords=Object.keys(p.weak).sort((a,b)=>p.weak[b]-p.weak[a]);
  const pool=[...weakWords.map(w=>learned.find(v=>v[0]===w)).filter(Boolean),...sample(learned,8)];
  const uniq=[];const seen=new Set();
  for(const v of pool){if(!seen.has(v[0])){seen.add(v[0]);uniq.push(v);}}
  const ex=[];
  for(const [is,cs] of uniq.slice(0,10)){
    const dir=Math.random()<.5;
    const wrong=dir?sample(allVocab.filter(q=>q[0]!==is).map(q=>q[1]),3):sample(allVocab.filter(q=>q[1]!==cs).map(q=>q[0]),3);
    ex.push(dir?{t:'mc',q:`Co znamená <span class="is">„${esc(is)}“</span>?${speakBtn(is)}`,opts:shuffle([cs,...wrong]),a:cs,word:is}
               :{t:'mc',q:`Jak se islandsky řekne <b>„${esc(cs)}“</b>?`,opts:shuffle([is,...wrong]),a:is,word:is,optIs:true});
  }
  return shuffle(ex).slice(0,10);
}

function lvlOrder(id){return['a1','a2','b1','b2','c1'].indexOf(id);}
function isLessonUnlocked(lv,idx){
  const p=P();
  if(lvlOrder(lv.id)<lvlOrder(p.unlocked))return true;
  if(lvlOrder(lv.id)>lvlOrder(p.unlocked)){
    const prev=COURSE[lvlOrder(lv.id)-1];
    if(!prev.lessons.every(l=>p.lessons[l.id]&&p.lessons[l.id].stars>0))return false;
  }
  if(idx===0)return true;
  const prevL=lv.lessons[idx-1];
  return p.lessons[prevL.id]&&p.lessons[prevL.id].stars>0;
}

function startReview(){

function vLesson(){

    <p style="color:var(--muted);font-size:.8rem;margin-top:8px">Znaky: á é í ó ú ý ð þ æ ö — <span id="charpad">${['á','é','í','ó','ú','ý','ð','þ','æ','ö'].map(c=>`<button class="btn quiet" style="padding:4px 9px" onclick="insChar('${c}')">${c}</button>`).join(' ')}</span></p>`;
  }else if(ex.t==='order'){
    body=`<p class="ex-q">Sestavte větu: <b>„${esc(ex.cs)}“</b></p>

  }else if(ex.t==='match'){
    body=`<p class="ex-q">Spojte dvojice</p><div class="matchgrid" id="mg">
      ${shuffle(ex.pairs.map((p,i)=>({txt:p[0],k:i,side:'is'})).concat(ex.pairs.map((p,i)=>({txt:p[1],k:i,side:'cs'})))).map(o=>`<button class="opt ${o.side==='is'?'is':''}" data-k="${o.k}" data-side="${o.side}" onclick="matchPick(this)">${esc(o.txt)}</button>`).join('')}</div>`;

  </div></div>`;

}
function confirmQuit(){if(confirm('Opustit lekci? Postup v ní se ztratí.'))go('map');}
function insChar(c){const i=$('#typein');if(!i)return;i.value+=c;i.focus();}
let mcChoice=null;
function mcSel(i){mcChoice=i;document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));document.querySelector(`.opt[data-i="${i}"]`).classList.add('sel');$('#checkbtn').disabled=false;}
function chipPick(btn){
  const built=$('#built');
  if(btn.parentElement.id==='bank'){btn.classList.add('used');const c=document.createElement('button');c.className='chip is';c.textContent=btn.dataset.w;c.dataset.src=btn.dataset.i;c.onclick=()=>{c.remove();document.querySelector(`#bank .chip[data-i="${c.dataset.src}"]`).classList.remove('used');};built.appendChild(c);}
}
function matchPick(btn){
  if(btn.disabled)return;
  const st=S.matchState;
  if(!st.sel){st.sel=btn;btn.classList.add('sel');return;}
  if(st.sel===btn){btn.classList.remove('sel');st.sel=null;return;}
  if(st.sel.dataset.side===btn.dataset.side){st.sel.classList.remove('sel');st.sel=btn;btn.classList.add('sel');return;}
  if(st.sel.dataset.k===btn.dataset.k){
    [st.sel,btn].forEach(b=>{b.classList.remove('sel');b.classList.add('right');b.disabled=true;});
    st.doneCnt++;st.sel=null;
    if(st.doneCnt===4)setTimeout(()=>answer(st.errs===0?true:'soft'),350);
  }else{
    const a=st.sel;[a,btn].forEach(b=>b.classList.add('wrong'));st.errs++;st.sel=null;
    setTimeout(()=>[a,btn].forEach(b=>{b.classList.remove('wrong','sel');}),500);
  }
}
function checkNow(){
  const ex=S.queue[S.qi];
  if(ex.t==='mc'||ex.t==='fill'){
    if(mcChoice===null)return;
    const pick=ex.t==='mc'?ex.opts[mcChoice]:mcChoice;
    const ok=ex.t==='mc'?pick===ex.a:mcChoice===ex.a;
    document.querySelectorAll('.opt').forEach((o,i)=>{
      const val=ex.t==='mc'?ex.opts[+o.dataset.i]:+o.dataset.i;
      const isRight=ex.t==='mc'?val===ex.a:val===ex.a;
      if(isRight)o.classList.add('right');else if(+o.dataset.i===mcChoice&&!ok)o.classList.add('wrong');
      o.disabled=true;});
    answer(ok);
  }else if(ex.t==='type'){
    const v=$('#typein').value;if(!v.trim())return;
    if(norm(v)===norm(ex.a))answer(true);
    else if(stripAcc(v)===stripAcc(ex.a))answer('soft');
    else answer(false);
  }else if(ex.t==='order'){
    const got=[...$('#built').children].map(c=>c.textContent).join(' ');
    answer(norm(got)===norm(ex.is));
  }
}
function answer(ok,skipped){
  const ex=S.queue[S.qi];mcChoice=null;
  const p=P();
  const correctTxt=ex.a||ex.is||(ex.t==='fill'?ex.opts[ex.a]:'')||'';
  if(ok===true||ok==='soft'){S.right++;if(ex.word)wordOk(p,ex.word);}
  else{S.wrong++;if(!skipped)S.hearts--;if(ex.word)wordBad(p,ex.word);}
  save();
  const fb=document.createElement('div');
  fb.className='feedback '+(ok?'ok':'bad');
  fb.innerHTML=`<div class="inner">
    <span class="msg">${ok===true?'Rétt! Správně ✓':ok==='soft'?(ex.t==='match'?'Spojeno — s pár přehmaty':'Téměř — pozor na délky a znaky'):skipped?'Přeskočeno':'Rangt — špatně'}</span>
    ${!ok&&correctTxt?`<span class="detail">Správně: <b class="is">${esc(ex.t==='fill'?ex.pre.replace('___',ex.opts[ex.a]):correctTxt)}</b> ${speakBtn(ex.t==='fill'?ex.pre.replace('___',ex.opts[ex.a]):correctTxt)}</span>`:''}
    ${ok==='soft'&&correctTxt?`<span class="detail">Přesně: <b class="is">${esc(correctTxt)}</b></span>`:''}
    <button class="btn ${ok?'':'danger'}" onclick="nextEx()">Pokračovat</button></div>`;
  const cb=document.querySelector('.checkbar');if(cb)cb.remove();
  document.body.appendChild(fb);
  document.querySelectorAll('.opt,.chip,.typein').forEach(e=>e.disabled=true);
}
function wordBad(p,w){p.weak[w]=(p.weak[w]||0)+2;}
function wordOk(p,w){if(p.weak[w]){p.weak[w]--;if(p.weak[w]<=0)delete p.weak[w];}}
function nextEx(){
  document.querySelectorAll('.feedback').forEach(f=>f.remove());
  if(S.hearts<=0){
    $('#app').innerHTML=`<div class="result"><div style="font-size:3rem">🫀</div>
      <h2>Došla srdíčka</h2><p style="color:var(--muted)">Nevadí — zkuste lekci znovu, opakování je základ.</p>
      <div class="row" style="justify-content:center"><button class="btn" onclick="${S.review?'startReview()':`startLesson('${S.lesson.id}')`}">Zkusit znovu</button>
      <button class="btn quiet" onclick="go('map')">Na mapu</button></div></div>`;
    return;
  }
  S.qi++;
  if(S.qi<S.queue.length)return render();
  finishLesson();
}
function finishLesson(){
  const p=P();
  const total=S.right+S.wrong;
  const acc=total?S.right/total:0;
  const perfect=S.wrong===0&&total>0;
  let xp=S.right*10+(perfect?20:0);
  if(S.review)xp=Math.round(xp*.6);
  addXp(p,xp);bumpStreak(p);
  let stars=0;
  if(!S.review){
    stars=acc>=.95?3:acc>=.75?2:1;
    const prev=p.lessons[S.lesson.id];
    p.lessons[S.lesson.id]={stars:Math.max(stars,prev?prev.stars:0),best:Math.max(Math.round(acc*100),prev?prev.best:0)};
  }
  const newBadges=grantBadges(p,perfect);
  save();
  pushProgress();
  go('result',{xp,acc,stars,perfect,newBadges,review:S.review});
}

  if(!confirm('Opravdu smazat profil „'+P().name+'“ včetně veškerého progresu?'))return;
  const p=P();
  if(p.social){rpc('leave_group',{p_id:p.social.pid,p_secret:p.social.secret}).catch(()=>{});}
  delete store.profiles[store.active];store.active=null;save();go('welcome');
}

/* ---- init ---- */
if(store.active&&P())go('map');else go('welcome');
</script>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});}
</script>
