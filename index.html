<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E7C66">
<meta name="description" content="Norðurljós — gamifikovaná výuka islandštiny A1–C2, česky.">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<title>Norðurljós — islandština hravě</title>
<style>
:root{
  --paper:#F3F7FA; --card:#FFFFFF; --ink:#1C2733; --muted:#5B6B7A;
  --accent:#0E7C66; --accent-ink:#FFFFFF; --accent-soft:#DCEFE9;
  --lava:#D4544A; --lava-soft:#FBE7E5; --lupine:#6F5FA8; --lupine-soft:#EDEAF6;
  --gold:#C9A227; --mist:#D9E4EC; --shadow:0 1px 3px rgba(28,39,51,.08),0 4px 14px rgba(28,39,51,.06);
}
@media (prefers-color-scheme: dark){:root{
  --paper:#131A22; --card:#1C2733; --ink:#E8EFF4; --muted:#93A4B3;
  --accent:#3FD6A8; --accent-ink:#0D2018; --accent-soft:#1E3A33;
  --lava:#F07B72; --lava-soft:#3C2523; --lupine:#A79AE0; --lupine-soft:#2C2740;
  --gold:#E3C35B; --mist:#2A3846; --shadow:0 1px 3px rgba(0,0,0,.4);
}}
:root[data-theme="light"]{
  --paper:#F3F7FA; --card:#FFFFFF; --ink:#1C2733; --muted:#5B6B7A;
  --accent:#0E7C66; --accent-ink:#FFFFFF; --accent-soft:#DCEFE9;
  --lava:#D4544A; --lava-soft:#FBE7E5; --lupine:#6F5FA8; --lupine-soft:#EDEAF6;
  --gold:#C9A227; --mist:#D9E4EC; --shadow:0 1px 3px rgba(28,39,51,.08),0 4px 14px rgba(28,39,51,.06);
}
:root[data-theme="dark"]{
  --paper:#131A22; --card:#1C2733; --ink:#E8EFF4; --muted:#93A4B3;
  --accent:#3FD6A8; --accent-ink:#0D2018; --accent-soft:#1E3A33;
  --lava:#F07B72; --lava-soft:#3C2523; --lupine:#A79AE0; --lupine-soft:#2C2740;
  --gold:#E3C35B; --mist:#2A3846; --shadow:0 1px 3px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;margin:0;line-height:1.5}
.serif,.is{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
#app{max-width:640px;margin:0 auto;padding:0 16px 64px}
h1,h2,h3{text-wrap:balance;margin:0}
button{font:inherit;cursor:pointer;border:none;border-radius:12px}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
input,select{font:inherit;color:var(--ink);background:var(--card);border:1.5px solid var(--mist);border-radius:10px;padding:10px 12px}
.topbar{display:flex;align-items:center;gap:14px;padding:14px 2px;position:sticky;top:0;background:var(--paper);z-index:5}
.topbar .brand{font-size:1.05rem;font-weight:700;margin-right:auto}
.stat{display:flex;align-items:center;gap:5px;font-weight:700;font-variant-numeric:tabular-nums;font-size:.95rem}
.stat small{font-weight:400;color:var(--muted)}
.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:20px}
.btn{background:var(--accent);color:var(--accent-ink);padding:13px 22px;font-weight:700;border-radius:14px;transition:transform .08s}
.btn:active{transform:scale(.97)}
.btn.ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn.quiet{background:var(--mist);color:var(--ink)}
.btn.danger{background:var(--lava-soft);color:var(--lava)}
.btn[disabled]{opacity:.45;cursor:default}
.row{display:flex;gap:10px;align-items:center}
.col{display:flex;flex-direction:column;gap:12px}
.eyebrow{text-transform:uppercase;letter-spacing:.09em;font-size:.72rem;font-weight:700;color:var(--muted)}
/* course map */
.level-head{display:flex;align-items:baseline;gap:10px;margin:30px 0 4px;border-bottom:2px solid var(--mist);padding-bottom:6px}
.level-head h2{font-size:1.25rem}
.level-head .pct{margin-left:auto;color:var(--muted);font-variant-numeric:tabular-nums;font-size:.85rem}
.path{display:flex;flex-direction:column;gap:10px;margin:14px 0}
.node{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px;width:100%;text-align:left;color:var(--ink)}
.node .dot{width:44px;height:44px;border-radius:50%;flex:none;display:grid;place-items:center;font-weight:800;background:var(--accent-soft);color:var(--accent);font-variant-numeric:tabular-nums}
.node.done .dot{background:var(--accent);color:var(--accent-ink)}
.node.locked{opacity:.5}
.node.locked .dot{background:var(--mist);color:var(--muted)}
.node .t{font-weight:700}
.node .stars{margin-left:auto;color:var(--gold);letter-spacing:2px;font-size:.9rem;flex:none}
.node small{color:var(--muted);display:block;font-weight:400}
/* lesson */
.progress{height:12px;background:var(--mist);border-radius:6px;overflow:hidden;flex:1}
.progress i{display:block;height:100%;background:var(--accent);border-radius:6px;transition:width .3s}
.hearts{font-size:1rem;letter-spacing:2px;flex:none;color:var(--lava);font-variant-numeric:tabular-nums}
.ex-card{margin-top:18px}
.ex-q{font-size:1.15rem;margin:6px 0 18px}
.ex-q .is{font-size:1.45rem}
.opts{display:grid;gap:10px}
.opts.two{grid-template-columns:1fr 1fr}
.opt{background:var(--card);border:2px solid var(--mist);border-radius:12px;padding:13px 15px;text-align:left;color:var(--ink);font-size:1.02rem}
.opt.sel{border-color:var(--accent);background:var(--accent-soft)}
.opt.right{border-color:var(--accent);background:var(--accent-soft)}
.opt.wrong{border-color:var(--lava);background:var(--lava-soft)}
.opt[disabled]{cursor:default}
.chips{display:flex;flex-wrap:wrap;gap:8px;min-height:52px;border-bottom:2px solid var(--mist);padding-bottom:10px;margin-bottom:14px}
.chip{background:var(--accent-soft);color:var(--ink);border-radius:10px;padding:9px 13px;font-size:1.02rem}
.bank .chip{background:var(--card);border:1.5px solid var(--mist)}
.bank{display:flex;flex-wrap:wrap;gap:8px}
.chip.used{visibility:hidden}
.typein{width:100%;font-size:1.1rem;padding:13px}
.feedback{position:fixed;left:0;right:0;bottom:0;padding:18px 16px 26px;z-index:10}
.feedback .inner{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.feedback.ok{background:var(--accent-soft)}
.feedback.bad{background:var(--lava-soft)}
.feedback .msg{font-weight:800}
.feedback.ok .msg{color:var(--accent)}
.feedback.bad .msg{color:var(--lava)}
.feedback .detail{width:100%;font-size:.95rem}
.feedback .btn{margin-left:auto}
.checkbar{position:fixed;left:0;right:0;bottom:0;padding:14px 16px 24px;background:var(--paper);border-top:1px solid var(--mist);z-index:9}
.checkbar .inner{max-width:640px;margin:0 auto;display:flex;gap:10px}
.checkbar .btn{flex:1}
.tip{background:var(--lupine-soft);border-radius:14px;padding:16px 18px;margin:14px 0}
.tip .eyebrow{color:var(--lupine)}
.speak{background:none;border:none;font-size:1.15rem;padding:2px 6px;vertical-align:middle}
/* results */
.result{text-align:center;padding:40px 20px}
.result .big{font-size:2.6rem;font-weight:800;font-variant-numeric:tabular-nums}
.medals{display:flex;gap:12px;justify-content:center;margin:18px 0;flex-wrap:wrap}
.medal{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:12px 18px;min-width:90px}
.medal .v{font-weight:800;font-size:1.3rem;font-variant-numeric:tabular-nums}
.medal .l{color:var(--muted);font-size:.78rem}
.badge-pop{background:var(--lupine-soft);color:var(--lupine);border-radius:12px;padding:10px 16px;font-weight:700;margin:6px auto;display:inline-block}
/* profile */
.badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.badge{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:12px;text-align:center;font-size:.85rem}
.badge.off{opacity:.35}
.badge .ico{font-size:1.6rem}
.matchgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.goalring{color:var(--muted);font-size:.85rem}
table.stattbl{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
table.stattbl td{padding:7px 4px;border-bottom:1px solid var(--mist)}
table.stattbl td:last-child{text-align:right;font-weight:700}
.footer-note{color:var(--muted);font-size:.8rem;text-align:center;margin-top:36px}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>

<div id="app"></div>

<script>
'use strict';
/* ================= DATA ================= */
const COURSE=[
{id:'a1',tag:'Úroveň A1',name:'Fyrstu skrefin — první kroky',lessons:[
 {id:'a1-1',title:'Pozdravy a představení',sub:'halló, takk, ég heiti…',
  tip:'<b>Ég heiti…</b> = jmenuji se. Otázka: <b>Hvað heitir þú?</b> (Jak se jmenuješ?). Islandština „vyká“ jen výjimečně — <b>þú</b> se používá téměř na všechny.',
  vocab:[['halló','ahoj'],['góðan daginn','dobrý den'],['gott kvöld','dobrý večer'],['bless','na shledanou'],['takk','děkuji'],['já','ano'],['nei','ne'],['afsakið','promiňte']],
  ex:[
   {t:'order',cs:'Jmenuji se Anna.',is:'Ég heiti Anna'},
   {t:'fill',pre:'Ég ___ Vojta.',opts:['heiti','heitir','heita'],a:0,cs:'Jmenuji se Vojta.'},
   {t:'mc',q:'Co znamená otázka <span class="is">„Hvað heitir þú?“</span>',opts:['Jak se jmenuješ?','Odkud jsi?','Kolik je ti let?','Jak se máš?'],a:'Jak se jmenuješ?'},
   {t:'order',cs:'Dobrý den, děkuji.',is:'Góðan daginn takk'},
   {t:'type',q:'Napište islandsky: <b>„ano“</b>',a:'já',word:'já'}]},
 {id:'a1-2',title:'Čísla 1–10',sub:'einn, tveir, þrír…',
  tip:'Číslovky 1–4 se v islandštině <b>skloňují podle rodu</b> (einn/ein/eitt). Zatím se učíme mužský tvar — ten uslyšíte při počítání.',
  vocab:[['einn','jedna'],['tveir','dva'],['þrír','tři'],['fjórir','čtyři'],['fimm','pět'],['sex','šest'],['sjö','sedm'],['átta','osm'],['níu','devět'],['tíu','deset']],
  ex:[
   {t:'mc',q:'Které číslo následuje po <span class="is">„sjö“</span>?',opts:['átta','sex','níu','tíu'],a:'átta',optIs:true},
   {t:'mc',q:'Kolik je <span class="is">tveir + þrír</span>?',opts:['fimm','fjórir','sex','sjö'],a:'fimm',optIs:true},
   {t:'type',q:'Napište islandsky číslo <b>10</b>',a:'tíu',word:'tíu'},
   {t:'order',cs:'Mám dvě děti.',is:'Ég á tvö börn'}]},
 {id:'a1-3',title:'Rodina',sub:'mamma, pabbi, systir…',
  tip:'<b>Ég á…</b> = mám (doslova „vlastním“). Sloveso <b>eiga</b> se používá pro rodinu i majetek: <i>Ég á systur</i> = mám sestru.',
  vocab:[['mamma','máma'],['pabbi','táta'],['bróðir','bratr'],['systir','sestra'],['barn','dítě'],['fjölskylda','rodina'],['amma','babička'],['afi','děda']],
  ex:[
   {t:'fill',pre:'Amma ___ gömul.',opts:['er','ert','eru'],a:0,cs:'Babička je stará.'},
   {t:'order',cs:'Mám velkou rodinu.',is:'Ég á stóra fjölskyldu'},
   {t:'mc',q:'Kdo je <span class="is">„bróðir“</span> vaší mámy?',opts:['strýc','děda','bratranec','táta'],a:'strýc'},
   {t:'type',q:'Napište islandsky: <b>„sestra“</b>',a:'systir',word:'systir'}]},
 {id:'a1-4',title:'Jídlo a pití',sub:'brauð, mjólk, kaffi…',
  tip:'Objednáváme zdvořile: <b>Ég ætla að fá…</b> (dám si…) nebo jednoduše <b>…, takk</b>. Pití: <b>að drekka</b>, jídlo: <b>að borða</b>.',
  vocab:[['brauð','chléb'],['mjólk','mléko'],['vatn','voda'],['kaffi','káva'],['te','čaj'],['fiskur','ryba'],['ostur','sýr'],['epli','jablko']],
  ex:[
   {t:'order',cs:'Chtěl bych vodu, děkuji.',is:'Ég ætla að fá vatn takk'},
   {t:'fill',pre:'Ég drekk ___ á morgnana.',opts:['kaffi','fiskur','ostur'],a:0,cs:'Ráno piju kávu.'},
   {t:'mc',q:'Islanďané jedí hodně <span class="is">„fiskur“</span>. Co to je?',opts:['ryba','skopové','chléb','sýr'],a:'ryba'},
   {t:'type',q:'Napište islandsky: <b>„mléko“</b>',a:'mjólk',word:'mjólk'}]},
 {id:'a1-5',title:'Sloveso „vera“ a zájmena',sub:'ég er, þú ert, við erum…',
  tip:'Časování <b>vera</b> (být): <i>ég er, þú ert, hann/hún/það er, við erum, þið eruð, þeir/þær/þau eru</i>. Nejdůležitější sloveso islandštiny — naučte se ho zpaměti.',
  vocab:[['ég','já'],['þú','ty'],['hann','on'],['hún','ona'],['við','my'],['þið','vy'],['þeir','oni'],['það','to / ono']],
  ex:[
   {t:'fill',pre:'Við ___ frá Tékklandi.',opts:['erum','er','eruð'],a:0,cs:'Jsme z Česka.'},
   {t:'fill',pre:'Þú ___ góður.',opts:['ert','er','erum'],a:0,cs:'Jsi hodný.'},
   {t:'order',cs:'Ona je učitelka.',is:'Hún er kennari'},
   {t:'fill',pre:'Þeir ___ heima.',opts:['eru','er','erum'],a:0,cs:'Oni jsou doma.'}]},
 {id:'a1-6',title:'Dny a čas',sub:'mánudagur, í dag, á morgun',
  tip:'Dny týdne končí na <b>-dagur</b> (den). <b>Í dag</b> = dnes, <b>á morgun</b> = zítra, <b>í gær</b> = včera.',
  vocab:[['mánudagur','pondělí'],['þriðjudagur','úterý'],['miðvikudagur','středa'],['fimmtudagur','čtvrtek'],['föstudagur','pátek'],['laugardagur','sobota'],['sunnudagur','neděle'],['í dag','dnes'],['á morgun','zítra']],
  ex:[
   {t:'mc',q:'Který den následuje po <span class="is">„föstudagur“</span>?',opts:['laugardagur','sunnudagur','mánudagur','fimmtudagur'],a:'laugardagur',optIs:true},
   {t:'order',cs:'Dnes je pondělí.',is:'Í dag er mánudagur'},
   {t:'type',q:'Napište islandsky: <b>„dnes“</b>',a:'í dag',word:'í dag'},
   {t:'mc',q:'<span class="is">„Laugardagur“</span> doslova znamená…',opts:['den koupele (prádla)','den slunce','den odpočinku','den trhu'],a:'den koupele (prádla)'}]},
 {id:'a1-7',title:'Barvy',sub:'rauður, blár, grænn…',
  tip:'Barvy jsou přídavná jména a <b>shodují se v rodě</b>: <i>rauður bíll</i> (m), <i>rauð peysa</i> (ž), <i>rautt hús</i> (s). Zatím se učíme mužský tvar.',
  vocab:[['rauður','červený'],['blár','modrý'],['grænn','zelený'],['gulur','žlutý'],['svartur','černý'],['hvítur','bílý'],['bleikur','růžový'],['brúnn','hnědý']],
  ex:[
   {t:'fill',pre:'Himinninn er ___.',opts:['blár','blá','blátt'],a:0,cs:'Nebe je modré. (himinn je mužský rod)'},
   {t:'order',cs:'Auto je červené.',is:'Bíllinn er rauður'},
   {t:'mc',q:'Jakou barvu má tráva?',opts:['grænn','gulur','blár','brúnn'],a:'grænn',optIs:true},
   {t:'type',q:'Napište islandsky: <b>„černý“</b>',a:'svartur',word:'svartur'}]},
 {id:'a1-8',title:'Zvířata',sub:'hundur, köttur, lundi…',
  tip:'<b>Lundi</b> (papuchalk) je neoficiální symbol Islandu — hnízdí jich tam přes polovina světové populace. Ovcí (<b>kind</b>) je na Islandu víc než lidí.',
  vocab:[['hundur','pes'],['köttur','kočka'],['kind','ovce'],['fugl','pták'],['kýr','kráva'],['mús','myš'],['hvalur','velryba'],['lundi','papuchalk']],
  ex:[
   {t:'order',cs:'Pes je velký.',is:'Hundurinn er stór'},
   {t:'fill',pre:'Kötturinn drekkur ___.',opts:['mjólk','brauð','epli'],a:0,cs:'Kočka pije mléko.'},
   {t:'mc',q:'Kterých zvířat je na Islandu víc než obyvatel?',opts:['kindur (ovce)','hundar (psi)','kýr (krávy)','mýs (myši)'],a:'kindur (ovce)',optIs:true},
   {t:'type',q:'Napište islandsky: <b>„pes“</b>',a:'hundur',word:'hundur'}]},
 {id:'a1-9',title:'Oblečení',sub:'peysa, úlpa, húfa…',
  tip:'„Mít na sobě“ = <b>vera í</b> + dativ: <i>Ég er í peysu</i>. <b>Lopapeysa</b> — islandský svetr s kruhovým vzorem — je národní poklad.',
  vocab:[['peysa','svetr'],['úlpa','bunda'],['buxur','kalhoty'],['skór','boty'],['húfa','čepice'],['vettlingar','rukavice'],['sokkar','ponožky'],['bolur','tričko']],
  ex:[
   {t:'order',cs:'Mám na sobě svetr.',is:'Ég er í peysu'},
   {t:'fill',pre:'Úti er kalt — taktu ___!',opts:['húfu','húfa','húfan'],a:0,cs:'Venku je zima — vezmi si čepici!'},
   {t:'mc',q:'Co je <span class="is">„lopapeysa“</span>?',opts:['islandský vlněný svetr s kruhovým vzorem','nepromokavá bunda','vlněná čepice s bambulí','turistické boty'],a:'islandský vlněný svetr s kruhovým vzorem'},
   {t:'type',q:'Napište islandsky: <b>„boty“</b>',a:'skór',word:'skór'}]},
 {id:'a1-10',title:'V restauraci',sub:'matseðill, pylsa, skyr…',
  tip:'Zdvořilá žádost: <b>Get ég fengið…?</b> (můžu dostat…?). Islandský hotdog se objednává <i>„ein með öllu“</i> — jeden se vším. <b>Skyr</b> je islandský mléčný výrobek podobný jogurtu.',
  vocab:[['matseðill','jídelní lístek'],['pylsa','párek (hotdog)'],['súpa','polévka'],['kjúklingur','kuře'],['grænmeti','zelenina'],['ávextir','ovoce'],['reikningur','účet'],['skyr','skyr (isl. jogurt)']],
  ex:[
   {t:'order',cs:'Můžu dostat jídelní lístek?',is:'Get ég fengið matseðilinn'},
   {t:'fill',pre:'Eina ___ með öllu, takk!',opts:['pylsu','pylsa','pylsur'],a:0,cs:'Jeden hotdog se vším, prosím!'},
   {t:'mc',q:'Chcete zaplatit. O co požádáte?',opts:['reikninginn','matseðilinn','grænmetið','eldhúsið'],a:'reikninginn',optIs:true},
   {t:'type',q:'Napište islandsky: <b>„polévka“</b>',a:'súpa',word:'súpa'}]}
]},
{id:'a2',tag:'Úroveň A2',name:'Á ferðinni — na cestě',lessons:[
 {id:'a2-1',title:'Počasí',sub:'rigning, snjór, vindur…',
  tip:'O počasí se mluví neosobně přes <b>það</b>: <i>Það er rigning</i> (prší), <i>Það er kalt</i> (je zima). Islandské přísloví: počasí se změní, počkejte pět minut.',
  vocab:[['veður','počasí'],['rigning','déšť'],['snjór','sníh'],['vindur','vítr'],['sól','slunce'],['kalt','chladno'],['heitt','horko'],['ský','mrak']],
  ex:[
   {t:'order',cs:'Dnes prší.',is:'Það er rigning í dag'},
   {t:'fill',pre:'Það er ___ úti.',opts:['kalt','kaldur','kuldi'],a:0,cs:'Venku je zima.'},
   {t:'mc',q:'Jak Islanďan řekne, že sněží?',opts:['Það snjóar','Það rignir','Það er sól','Það er vindur'],a:'Það snjóar',optIs:true},
   {t:'type',q:'Napište islandsky: <b>„slunce“</b>',a:'sól',word:'sól'}]},

/* ================= EXERCISE GENERATION ================= */
function genFromVocab(lesson,allVocab){
  const ex=[];const v=lesson.vocab;
  for(const [is,cs] of sample(v,Math.min(3,v.length))){
    const wrong=sample([...new Set(allVocab.filter(q=>q[0]!==is).map(q=>q[1]).filter(x=>x!==cs))],3);
    ex.push({t:'mc',q:`Co znamená <span class="is">„${esc(is)}“</span>?${speakBtn(is)}`,opts:shuffle([cs,...wrong]),a:cs,word:is});
  }
  for(const [is,cs] of sample(v,Math.min(3,v.length))){
    const wrong=sample([...new Set(allVocab.filter(q=>q[1]!==cs).map(q=>q[0]).filter(x=>x!==is))],3);
    ex.push({t:'mc',q:`Jak se islandsky řekne <b>„${esc(cs)}“</b>?`,opts:shuffle([is,...wrong]),a:is,word:is,optIs:true});
  }
  if(v.length>=4)ex.push({t:'match',pairs:sample(v,4)});
  const seen=P().seen||{};
  for(const [is,cs] of sample(v.filter(q=>q[0].length<=14&&!q[0].includes(' ')&&(seen[q[0]]||0)>=2),2)){
    ex.push({t:'type',q:`Napište islandsky: <b>„${esc(cs)}“</b>`,a:is,word:is});
  }
  return ex;
}
function buildQueue(lesson){
  const p=P();
  const allVocab=COURSE.flatMap(lv=>lv.lessons).flatMap(l=>l.vocab);
  const gen=genFromVocab(lesson,allVocab);
  const authored=(lesson.ex||[]).map(e=>{
    if(e.t==='type'&&e.word&&(p.seen[e.word]||0)<2){
      const pair=(lesson.vocab||[]).find(v=>v[0]===e.word);
      if(pair){const wrong=sample(allVocab.filter(q=>q[0]!==e.word).map(q=>q[0]),3);
        return {t:'mc',q:`Jak se islandsky řekne <b>„${esc(pair[1])}“</b>?`,opts:shuffle([e.word,...wrong]),a:e.word,word:e.word,optIs:true};}
    }
    return {...e};
  });
  const weight={mc:0,match:0,fill:1,order:2,type:3};
  return shuffle([...authored,...gen]).slice(0,12).sort((a,b)=>(weight[a.t]||0)-(weight[b.t]||0));
}
function buildReviewQueue(p){
  const allVocab=COURSE.flatMap(lv=>lv.lessons).flatMap(l=>l.vocab);
  const learned=[];
  for(const lv of COURSE)for(const l of lv.lessons)if(p.lessons[l.id])learned.push(...l.vocab);
  if(!learned.length)return[];
  const weakWords=Object.keys(p.weak).sort((a,b)=>p.weak[b]-p.weak[a]);
  const pool=[...weakWords.map(w=>learned.find(v=>v[0]===w)).filter(Boolean),...sample(learned,8)];
  const uniq=[];const seen=new Set();
  for(const v of pool){if(!seen.has(v[0])){seen.add(v[0]);uniq.push(v);}}
  const ex=[];
  for(const [is,cs] of uniq.slice(0,10)){
    const dir=Math.random()<.5;
    const wrong=dir?sample([...new Set(allVocab.filter(q=>q[0]!==is).map(q=>q[1]).filter(x=>x!==cs))],3):sample([...new Set(allVocab.filter(q=>q[1]!==cs).map(q=>q[0]).filter(x=>x!==is))],3);
    ex.push(dir?{t:'mc',q:`Co znamená <span class="is">„${esc(is)}“</span>?${speakBtn(is)}`,opts:shuffle([cs,...wrong]),a:cs,word:is}
               :{t:'mc',q:`Jak se islandsky řekne <b>„${esc(cs)}“</b>?`,opts:shuffle([is,...wrong]),a:is,word:is,optIs:true});
  }
  return shuffle(ex).slice(0,10);
}

        <span class="dot">${st&&st.stars>0?'✓':i+1}</span>
        <span><span class="t">${esc(l.title)}</span><small>${esc(l.sub)}</small></span>
        <span class="stars">${stars}${unlocked?'':'🔒'}</span></button>`;}).join('')}</div>`;}).join('')}
  <p class="footer-note">Obsah kurzu je původní. Norðurljós = polární záře.</p>`;
}

/* ---- lesson session ---- */
function startLesson(id){
  const lesson=COURSE.flatMap(lv=>lv.lessons).find(l=>l.id===id);
  QDONE=[];
  go('lesson',{lesson,queue:buildQueue(lesson),qi:0,hearts:3,right:0,wrong:0,combo:0,bonus:0,showTip:!!lesson.tip,review:false});
}
function startReview(){
  const q=buildReviewQueue(P());
  if(!q.length){alert('Nejdřív dokončete aspoň jednu lekci.');return;}
  QDONE=[];
  go('lesson',{lesson:{id:null,title:'Procvičování',tip:null},queue:q,qi:0,hearts:3,right:0,wrong:0,combo:0,bonus:0,showTip:false,review:true});
}
function vLesson(){
  if(S.showTip){
    $('#app').innerHTML=`
    <div class="topbar"><button class="btn quiet" onclick="go('map')">✕</button><span class="brand">${esc(S.lesson.title)}</span></div>
    <div class="tip"><span class="eyebrow">Gramatika</span><div style="margin-top:8px">${S.lesson.tip}</div></div>
    ${S.lesson.vocab?`<div class="card"><span class="eyebrow">Nová slovíčka</span>
      <table class="stattbl" style="margin-top:8px">${S.lesson.vocab.map(v=>`<tr><td class="is">${esc(v[0])} ${speakBtn(v[0])}</td><td>${esc(v[1])}</td></tr>`).join('')}</table></div>`:''}
    <div style="margin-top:16px"><button class="btn" style="width:100%" onclick="S.showTip=false;render()">Jdeme na to →</button></div>`;
    return;
  }
  const ex=S.queue[S.qi];
  const head=`<div class="topbar"><button class="btn quiet" onclick="confirmQuit()">✕</button>
    <div class="progress"><i style="width:${S.qi/S.queue.length*100}%"></i></div>
    <span class="hearts">${'❤️'.repeat(S.hearts)}${'🖤'.repeat(3-S.hearts)}</span></div>`;
  let body='';
  if(ex.t==='mc'){
    body=`<p class="ex-q">${ex.q}</p><div class="opts">${ex.opts.map((o,i)=>`<button class="opt ${ex.optIs?'is':''}" data-i="${i}" onclick="mcSel(${i})">${esc(o)}</button>`).join('')}</div>`;
  }else if(ex.t==='fill'){
    body=`<p class="ex-q">Doplňte: <span class="is">${esc(ex.pre)}</span>${speakBtn(ex.pre.replace('___',ex.opts[ex.a]))}<br><small style="color:var(--muted)">${esc(ex.cs)}</small></p>
    <div class="opts two">${ex.opts.map((o,i)=>`<button class="opt is" data-i="${i}" onclick="mcSel(${i})">${esc(o)}</button>`).join('')}</div>`;
  }else if(ex.t==='type'){
    body=`<p class="ex-q">${ex.q}</p><input class="typein is" id="typein" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Odpověď islandsky…">
    <p style="color:var(--muted);font-size:.8rem;margin-top:8px">Znaky: á é í ó ú ý ð þ æ ö — <span id="charpad">${['á','é','í','ó','ú','ý','ð','þ','æ','ö'].map(c=>`<button class="btn quiet" style="padding:4px 9px" onclick="insChar('${c}')">${c}</button>`).join(' ')}</span></p>`;
  }else if(ex.t==='order'){
    body=`<p class="ex-q">Sestavte větu: <b>„${esc(ex.cs)}“</b></p>
    <div class="chips" id="built"></div>
    <div class="bank" id="bank">${shuffle(ex.is.split(' ')).map((w,i)=>`<button class="chip is" data-w="${esc(w)}" data-i="${i}" onclick="chipPick(this)">${esc(w)}</button>`).join('')}</div>`;
  }else if(ex.t==='match'){
    const left=shuffle(ex.pairs.map((p,i)=>({txt:p[0],k:i})));
    const right=shuffle(ex.pairs.map((p,i)=>({txt:p[1],k:i})));
    body=`<p class="ex-q">Spojte dvojice <small style="color:var(--muted)">(vlevo islandsky, vpravo česky)</small></p><div class="matchgrid" id="mg">
      <div class="col">${left.map(o=>`<button class="opt is" data-k="${o.k}" data-side="is" onclick="matchPick(this)">${esc(o.txt)}</button>`).join('')}</div>
      <div class="col">${right.map(o=>`<button class="opt" data-k="${o.k}" data-side="cs" onclick="matchPick(this)">${esc(o.txt)}</button>`).join('')}</div></div>`;
  }
  $('#app').innerHTML=head+`<div class="card ex-card">${body}</div><div style="height:110px"></div>
  <div class="checkbar"><div class="inner">
    ${ex.t==='match'?'':`<button class="btn quiet" onclick="answer(null,true)">Přeskočit</button><button class="btn" id="checkbtn" onclick="checkNow()" ${ex.t==='mc'||ex.t==='fill'?'disabled':''}>Zkontrolovat</button>`}
  </div></div>`;
  if(ex.t==='type'){const inp=$('#typein');inp.focus();inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkNow();});}
  S.matchState={sel:null,doneCnt:0,errs:0};
}
function confirmQuit(){if(confirm('Opustit lekci? Postup v ní se ztratí.'))go('map');}
function insChar(c){const i=$('#typein');if(!i)return;i.value+=c;i.focus();}
let mcChoice=null;
function mcSel(i){mcChoice=i;document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));document.querySelector(`.opt[data-i="${i}"]`).classList.add('sel');$('#checkbtn').disabled=false;}
function chipPick(btn){
  const built=$('#built');
  if(btn.parentElement.id==='bank'){btn.classList.add('used');const c=document.createElement('button');c.className='chip is';c.textContent=btn.dataset.w;c.dataset.src=btn.dataset.i;c.onclick=()=>{c.remove();document.querySelector(`#bank .chip[data-i="${c.dataset.src}"]`).classList.remove('used');};built.appendChild(c);}
}
function matchPick(btn){
  if(btn.disabled)return;
  const st=S.matchState;
  if(!st.sel){st.sel=btn;btn.classList.add('sel');return;}
  if(st.sel===btn){btn.classList.remove('sel');st.sel=null;return;}
  if(st.sel.dataset.side===btn.dataset.side){st.sel.classList.remove('sel');st.sel=btn;btn.classList.add('sel');return;}
  if(st.sel.dataset.k===btn.dataset.k){
    [st.sel,btn].forEach(b=>{b.classList.remove('sel');b.classList.add('right');b.disabled=true;});
    st.doneCnt++;st.sel=null;
    if(st.doneCnt===4)setTimeout(()=>answer(st.errs===0?true:'soft'),350);
  }else{
    const a=st.sel;[a,btn].forEach(b=>b.classList.add('wrong'));st.errs++;st.sel=null;
    setTimeout(()=>[a,btn].forEach(b=>{b.classList.remove('wrong','sel');}),500);
  }
}
function checkNow(){
  const ex=S.queue[S.qi];
  if(ex.t==='mc'||ex.t==='fill'){
    if(mcChoice===null)return;
    const pick=ex.t==='mc'?ex.opts[mcChoice]:mcChoice;
    const ok=ex.t==='mc'?pick===ex.a:mcChoice===ex.a;
    document.querySelectorAll('.opt').forEach((o,i)=>{
      const val=ex.t==='mc'?ex.opts[+o.dataset.i]:+o.dataset.i;
      const isRight=ex.t==='mc'?val===ex.a:val===ex.a;
      if(isRight)o.classList.add('right');else if(+o.dataset.i===mcChoice&&!ok)o.classList.add('wrong');
      o.disabled=true;});
    answer(ok);
  }else if(ex.t==='type'){
    const v=$('#typein').value;if(!v.trim())return;
    if(norm(v)===norm(ex.a))answer(true);
    else if(stripAcc(v)===stripAcc(ex.a))answer('soft');
    else answer(false);
  }else if(ex.t==='order'){
    const got=[...$('#built').children].map(c=>c.textContent).join(' ');
    answer(norm(got)===norm(ex.is));
  }
}
function answer(ok,skipped){
  const ex=S.queue[S.qi];mcChoice=null;
  const p=P();
  const correctTxt=ex.a||ex.is||(ex.t==='fill'?ex.opts[ex.a]:'')||'';
  if(ok===true||ok==='soft'){
    S.right++;S.combo=(S.combo||0)+1;
    if(S.combo>=3)S.bonus=(S.bonus||0)+Math.min(S.combo-2,5);
    if(S.combo===5)questTick('combo5');
    if(ex.t==='type')questTick('type10');
    if(ex.word)wordOk(p,ex.word);
  }
  else{S.wrong++;S.combo=0;if(!skipped)S.hearts--;if(ex.word)wordBad(p,ex.word);}
  save();
  const fb=document.createElement('div');
  fb.className='feedback '+(ok?'ok':'bad');
  fb.innerHTML=`<div class="inner">
    <span class="msg">${ok===true?'Rétt! Správně ✓'+(S.combo>=3?` ⚡ combo ×${S.combo}`:''):ok==='soft'?(ex.t==='match'?'Spojeno — s pár přehmaty':'Téměř — pozor na délky a znaky'):skipped?'Přeskočeno':'Rangt — špatně'}</span>
    ${!ok&&correctTxt?`<span class="detail">Správně: <b class="is">${esc(ex.t==='fill'?ex.pre.replace('___',ex.opts[ex.a]):correctTxt)}</b> ${speakBtn(ex.t==='fill'?ex.pre.replace('___',ex.opts[ex.a]):correctTxt)}</span>`:''}
    ${ok==='soft'&&correctTxt?`<span class="detail">Přesně: <b class="is">${esc(correctTxt)}</b></span>`:''}
    <button class="btn ${ok?'':'danger'}" onclick="nextEx()">Pokračovat</button></div>`;
  const cb=document.querySelector('.checkbar');if(cb)cb.remove();
  document.body.appendChild(fb);
  document.querySelectorAll('.opt,.chip,.typein').forEach(e=>e.disabled=true);
}
function wordBad(p,w){p.weak[w]=(p.weak[w]||0)+2;}
function wordOk(p,w){p.seen[w]=(p.seen[w]||0)+1;if(p.weak[w]){p.weak[w]--;if(p.weak[w]<=0)delete p.weak[w];}}
function nextEx(){
  document.querySelectorAll('.feedback').forEach(f=>f.remove());
  if(S.hearts<=0){
    $('#app').innerHTML=`<div class="result"><div style="font-size:3rem">🫀</div>
      <h2>Došla srdíčka</h2><p style="color:var(--muted)">Nevadí — zkuste lekci znovu, opakování je základ.</p>
      <div class="row" style="justify-content:center"><button class="btn" onclick="${S.review?'startReview()':`startLesson('${S.lesson.id}')`}">Zkusit znovu</button>
      <button class="btn quiet" onclick="go('map')">Na mapu</button></div></div>`;
    return;
  }
  S.qi++;
  if(S.qi<S.queue.length)return render();
  finishLesson();
}
function finishLesson(){
  const p=P();
  const total=S.right+S.wrong;
  const acc=total?S.right/total:0;
  const perfect=S.wrong===0&&total>0;
  let xp=S.right*10+(S.bonus||0)+(perfect?20:0);
  if(S.review)xp=Math.round(xp*.6);
  addXp(p,xp);bumpStreak(p);
  questTick('xp50',xp);
  if(S.review)questTick('review1');else{questTick('lesson1');if(perfect)questTick('perfect');}
  let stars=0;
  if(!S.review){
    stars=acc>=.95?3:acc>=.75?2:1;
    const prev=p.lessons[S.lesson.id];
    p.lessons[S.lesson.id]={stars:Math.max(stars,prev?prev.stars:0),best:Math.max(Math.round(acc*100),prev?prev.best:0)};
  }
  const newBadges=grantBadges(p,perfect);
  save();
  pushProgress();
  go('result',{xp,acc,stars,perfect,newBadges,review:S.review,qdone:QDONE.slice()});
}
function vResult(){
  const p=P();
  $('#app').innerHTML=`<div class="result">
    <div style="font-size:3.4rem">${S.perfect?'💎':S.acc>=.75?'🌟':'✅'}</div>
    <h2>${S.review?'Procvičeno!':S.perfect?'Fullkomið! Bez jediné chyby':'Lekce hotová!'}</h2>
    ${!S.review?`<div style="color:var(--gold);font-size:1.8rem;letter-spacing:4px;margin:6px 0">${'★'.repeat(S.stars)}${'☆'.repeat(3-S.stars)}</div>`:''}
    <div class="medals">
      <div class="medal"><div class="v">+${S.xp}</div><div class="l">XP</div></div>
      <div class="medal"><div class="v">${Math.round(S.acc*100)} %</div><div class="l">úspěšnost</div></div>
      <div class="medal"><div class="v">🔥 ${streakLive(p)}</div><div class="l">dní v řadě</div></div>
    </div>
    ${S.newBadges.map(b=>`<div class="badge-pop">${b.ico} Nový odznak: ${esc(b.name)}</div>`).join('')}
    ${(S.qdone||[]).map(d=>`<div class="badge-pop">🎯 Výzva splněna: ${esc(d.txt)} (+${d.reward} XP)</div>`).join('')}
    <div style="margin-top:20px"><button class="btn" onclick="go('map')">Pokračovat</button></div></div>`;
}

/* ---- leaderboard ---- */
function vBoard(){
  const p=P();
  if(!p.social){
    $('#app').innerHTML=`
    <div class="topbar"><button class="btn quiet" onclick="go('map')">←</button><span class="brand">🏆 Žebříček přátel</span></div>
    <div class="card col">
      <p>Propojte se s přáteli a porovnávejte XP a streaky. Žebříček vidí <b>jen členové vaší skupiny</b> — kdo nezná kód, nevidí nic.</p>
      <button class="btn" onclick="createGroup()">Vytvořit novou skupinu</button>
      <div class="row"><input id="gcode" style="flex:1" placeholder="Kód skupiny od kamaráda (NL-…)" autocapitalize="off" autocomplete="off">
      <button class="btn ghost" onclick="joinGroup($('#gcode').value)">Připojit se</button></div>
      <p style="color:var(--muted);font-size:.85rem;margin:0">Vyžaduje připojení k internetu. Sdílí se jen přezdívka, XP, streak a počet lekcí.</p>
    </div>`;
    return;
  }
  $('#app').innerHTML=`
  <div class="topbar"><button class="btn quiet" onclick="go('map')">←</button><span class="brand">🏆 Žebříček přátel</span>
    <button class="btn quiet" onclick="render()" title="Obnovit">↻</button></div>
  <div class="card row" style="justify-content:space-between;flex-wrap:wrap">
    <div><span class="eyebrow">Kód skupiny</span><div style="font-weight:700;font-variant-numeric:tabular-nums">${esc(p.social.group)}</div></div>
    <button class="btn ghost" onclick="navigator.clipboard&&navigator.clipboard.writeText('${esc(p.social.group)}').then(()=>this.textContent='Zkopírováno ✓')">Kopírovat kód</button>
  </div>
  <div class="card" style="margin-top:14px" id="lb">Načítám žebříček…</div>
  <div style="margin-top:14px"><button class="btn danger" style="width:100%" onclick="leaveGroup()">Opustit skupinu</button></div>
  <p class="footer-note">Kód pošlete kamarádům — zadají ho v „Připojit se“. Pokrok se odesílá po každé dokončené lekci.</p>`;
  rpc('get_leaderboard',{p_group:p.social.group}).then(rows=>{
    if(S.view!=='board')return;
    const lb=$('#lb');if(!lb)return;
    if(!rows||!rows.length){lb.textContent='Skupina je zatím prázdná.';return;}
    const wk=weekKey();
    const wx=r=>(r.week_key===wk?r.week_xp||0:0);
    rows.sort((a,b)=>wx(b)-wx(a)||b.xp-a.xp);
    const hasWeek=rows.some(r=>r.week_key!==undefined);
    lb.innerHTML=`<span class="eyebrow">⚡ Týdenní závod</span><table class="stattbl" style="margin-top:6px">
      <tr style="color:var(--muted);font-size:.78rem"><td></td><td>jméno</td><td style="text-align:right">týden</td><td style="text-align:right">celkem</td><td style="text-align:right">🔥</td><td style="text-align:right">úroveň</td></tr>
      ${rows.map((r,i)=>{
        const me=r.name===p.name;
        const rank=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
        return`<tr style="${me?'background:var(--accent-soft);font-weight:700':''}">
          <td>${rank}</td><td>${esc(r.name)}<br><small style="color:var(--muted);font-weight:400">${ago(r.updated_at)} · ${r.lessons} lekcí</small></td>
          <td style="text-align:right">${hasWeek?'+'+wx(r):'–'}</td><td style="text-align:right">${r.xp}</td>
          <td style="text-align:right">${r.streak}</td><td style="text-align:right">${esc(r.level.toUpperCase())}</td></tr>`;}).join('')}
    </table>
    <p style="color:var(--muted);font-size:.78rem;margin:8px 0 0">Pořadí podle XP získaných tento týden — v pondělí se závod restartuje.</p>`;
  }).catch(()=>{const lb=$('#lb');if(lb)lb.textContent='Žebříček se nepodařilo načíst — zkontrolujte připojení k internetu.';});
}

/* ---- profile ---- */
function vProfile(){
  const p=P();
  const done=Object.keys(p.lessons).filter(k=>p.lessons[k].stars>0).length;
  $('#app').innerHTML=`
  <div class="topbar"><button class="btn quiet" onclick="go('map')">←</button><span class="brand">${esc(p.name)}</span></div>
  <div class="card">
    <span class="eyebrow">Statistiky</span>
    <table class="stattbl" style="margin-top:8px">
      <tr><td>Celkem XP</td><td>${p.xp}</td></tr>
      <tr><td>Dnešní XP</td><td>${xpToday(p)} / ${p.goal}</td></tr>
      <tr><td>Streak</td><td>🔥 ${streakLive(p)} dní</td></tr>
      <tr><td>Dokončené lekce</td><td>${done} / ${COURSE.reduce((n,l)=>n+l.lessons.length,0)}</td></tr>
      <tr><td>Slabá slovíčka</td><td>${Object.keys(p.weak).length}</td></tr>
    </table>
  </div>
  <div class="card" style="margin-top:14px">
    <span class="eyebrow">Odznaky</span>
    <div class="badges" style="margin-top:10px">${BADGES.map(b=>`<div class="badge ${p.badges.includes(b.id)?'':'off'}"><div class="ico">${b.ico}</div><b>${esc(b.name)}</b><br><small>${esc(b.desc)}</small></div>`).join('')}</div>
  </div>
  <div class="card col" style="margin-top:14px">
    <span class="eyebrow">Data</span>
    <button class="btn ghost" onclick="exportData()">⬇︎ Export progresu (JSON)</button>
    <label class="btn ghost" style="text-align:center">⬆︎ Import progresu<input type="file" accept=".json" style="display:none" onchange="importData(this)"></label>
    <button class="btn quiet" onclick="go('welcome')">Přepnout profil</button>
    <button class="btn danger" onclick="deleteProfile()">Smazat tento profil</button>
  </div>`;
}
function exportData(){
  const blob=new Blob([JSON.stringify({profile:P(),exported:today()},null,1)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='nordurljos-'+P().name+'.json';a.click();
}
function importData(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.profile||!d.profile.name)throw 0;
    const id='p'+Math.random().toString(36).slice(2,9);store.profiles[id]=migrateP(d.profile);store.active=id;save();go('map');
  }catch(e){alert('Soubor se nepodařilo načíst — není to export z této aplikace.');}};
  r.readAsText(f);
}
function deleteProfile(){
  if(!confirm('Opravdu smazat profil „'+P().name+'“ včetně veškerého progresu?'))return;
  const p=P();
  if(p.social){rpc('leave_group',{p_id:p.social.pid,p_secret:p.social.secret}).catch(()=>{});}
  delete store.profiles[store.active];store.active=null;save();go('welcome');
}

/* ---- init ---- */
if(store.active&&P()){migrateP(P());go('map');}else go('welcome');
